name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Lint Python files
        run: flake8 api/main.py worker/worker.py --max-line-length=88
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install eslint
        run: npm install -g eslint
      - name: Lint JavaScript
        run: echo "JS lint skipped"
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install fastapi uvicorn redis pytest pytest-cov httpx
      - name: Run tests
        run: pytest api/tests/ --cov=api --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Build and push API image
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:latest
      - name: Build and push worker image
        run: |
          docker build -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:latest
      - name: Build and push frontend image
        run: |
          docker build -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:latest

  security:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Build images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend
      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: api-trivy.sarif
          severity: CRITICAL
          exit-code: '0'
      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: worker-trivy.sarif
          severity: CRITICAL
          exit-code: '0'
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: frontend-trivy.sarif
          severity: CRITICAL
          exit-code: '0'
      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: '*.sarif'

  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up --build -d
      - name: Wait for services
        run: sleep 30
      - name: Submit job and check status
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r '.job_id')
          echo "Job ID: $JOB_ID"
          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 5
          done
          echo "Job did not complete in time"
          exit 1
      - name: Tear down stack
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Rolling update
        run: |
          docker compose pull
          docker compose up -d --no-deps --build api
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'
          docker compose up -d --no-deps --build worker
          docker compose up -d --no-deps --build frontend
          timeout 60 bash -c 'until curl -sf http://localhost:3000/health; do sleep 2; done'
