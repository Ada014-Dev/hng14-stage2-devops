version: '3.8'

services:
redis:
image: redis:7-alpine
networks:
- internal
healthcheck:
test: ["CMD", "redis-cli", "ping"]
interval: 30s
timeout: 10s
retries: 3
deploy:
resources:
limits:
cpus: '0.5'
memory: 128M

api:
build: ./api
environment:
- REDIS_URL=redis://redis:6379
networks:
- internal
depends_on:
redis:
condition: service_healthy
healthcheck:
test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
interval: 30s
timeout: 10s
retries: 3
deploy:
resources:
limits:
cpus: '0.5'
memory: 256M

worker:
build: ./worker
environment:
- REDIS_URL=redis://redis:6379
networks:
- internal
depends_on:
redis:
condition: service_healthy
deploy:
resources:
limits:
cpus: '0.5'
memory: 256M

frontend:
build: ./frontend
environment:
- API_URL=http://api:8000
ports:
- "3000:3000"
networks:
- internal
depends_on:
api:
condition: service_healthy
deploy:
resources:
limits:
cpus: '0.5'
memory: 256M

networks:
internal:
driver: bridge
